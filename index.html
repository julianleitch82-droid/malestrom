<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Malestrom - Track your gym workouts offline">
    <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <title>Malestrom</title>

    <!-- Link to manifest for PWA install support -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS meta tags for PWA installation via Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Malestrom">

    <!-- Global stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main container for the app -->
    <div id="app-container">

        <!-- Header with app title and settings navigation -->
        <header class="header">
            <h1 class="app-title">💪 Malestrom</h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link active" data-page="home">Home</a>
                <a href="info.html" class="nav-link" data-page="info">Info</a>
            </nav>
        </header>

        <!-- Main content area -->
        <main class="main-content">
            
            <!-- Home screen: Display the 3 workout days as cards -->
            <section id="home-screen" class="screen active">
                <h2 class="section-title">Select a Workout Day</h2>
                
                <!-- Info text explaining the layout -->
                <p class="intro-text">
                    Tap a day to start your workout. Your previous sessions are shown below each day.
                </p>

                <!-- Workout day cards container — populated by app.js from PROGRAM.days -->
                <div id="days-container" class="days-container"></div>

            </section>

        </main>

        <p class="info-credit">Program by <a href="https://www.facebook.com/jessmalescoachingfitness" target="_blank" rel="noopener">Jess Males Coaching &amp; Fitness</a></p>

    </div>

    <!-- Register the service worker for offline support -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>

    <!-- Load the main app logic -->
    <script src="app.js"></script>
</body>
</html>
